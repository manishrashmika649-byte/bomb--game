<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomb Defuser - Cyber Mission</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>
    <div class="mission-control">
        <div id="intro-screen">
            <div class="bomb-logo-glow">💣</div>
            <h1 class="main-game-title">:: BOMB DEFUSER ::</h1>
            <p class="mission-protocol">// Cyber Mission Protocol Active //</p>
            <div class="cyber-scanner-container">
                <div class="scanning-line"></div>
                <div class="cyber-dots">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>
            <button id="hero-play-btn">PLAY NOW</button>
        </div>

        <div id="auth-screen" class="hidden">
            <div id="login-form">
                <h2>AGENT ACCESS</h2>
                <h3>LOGIN</h3>
                <input type="text" id="login-user" placeholder="Username">
                <input type="password" id="login-pass" placeholder="Password">
                <br><br>
                <button id="login-submit-btn">LOGIN</button>
                <p class="auth-toggle-text">New Agent? <a href="#" id="to-register" class="auth-link">[ REGISTER HERE ]</a></p>
            </div>

            <div id="register-form" class="hidden">
                <h2>AGENT REGISTRATION</h2>
                <input type="text" id="reg-user" placeholder="Choose Username">
                <input type="password" id="reg-pass" placeholder="Choose Password">
                <br><br>
                <button id="register-submit-btn">REGISTER</button>
                <p class="auth-toggle-text">Already have an account? <a href="#" id="to-login" class="auth-link">[ LOGIN HERE ]</a></p>
            </div>
        </div>
    </div> <script src="script.js"></script>
</body>
